version: 2

models:
  - name: stg_positions
    description: "Camada staging das experiências profissionais do LinkedIn, derivada da tabela bronze.positions."

    columns:
      - name: company_name
        description: "Nome da empresa da experiência."
        data_tests:
          - not_null

      - name: title
        description: "Cargo da experiência."
        data_tests:
          - not_null

      - name: description
        description: "Descrição detalhada da experiência."

      - name: location
        description: "Localização da experiência."

      - name: started_on
        description: "Data de início da experiência."
        data_tests:
          - not_null

      - name: finished_on
        description: "Data de fim da experiência."

      - name: is_current
        description: "Indicador se a posição está em andamento."
        data_tests:
          - not_null