version: 2

models:
  - name: mart_ingestion_audit_health_timeline
    description: "Mart operacional com saúde da ingestão ao longo do tempo no grão de execução por tabela."

    columns:
      - name: loaded_at_utc
        data_tests:
          - not_null

      - name: table_key
        data_tests:
          - not_null

      - name: row_count_after_transform
        data_tests:
          - not_null

      - name: health_status
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [saudavel, atencao, esvaziado, sem_dados]

      - name: successful_load_flag
        data_tests:
          - not_null

  - name: mart_ingestion_audit_null_rate_timeline
    description: "Mart operacional com tendência temporal das taxas de null por coluna monitorada na ingestão."

    columns:
      - name: loaded_at_utc
        data_tests:
          - not_null

      - name: table_key
        data_tests:
          - not_null

      - name: monitored_column
        data_tests:
          - not_null

      - name: null_rate_after_transform
        data_tests:
          - not_null

  - name: mart_skills_summary
    columns:
      - name: skill_category
        data_tests:
          - not_null
      - name: total_skills
        data_tests:
          - not_null

  - name: mart_saved_job_alerts_summary
    columns:
      - name: alert_frequency
        data_tests:
          - not_null
      - name: total_alerts
        data_tests:
          - not_null

  - name: mart_volunteering_summary
    columns:
      - name: cause_clean
        data_tests:
          - not_null
      - name: total_volunteering_roles
        data_tests:
          - not_null

  - name: mart_invitations_summary
    columns:
      - name: direction
        data_tests:
          - not_null
      - name: total_invitations
        data_tests:
          - not_null

  - name: mart_events_summary
    columns:
      - name: status
        data_tests:
          - not_null
      - name: total_events
        data_tests:
          - not_null

  - name: mart_learning_summary
    columns:
      - name: content_type_clean
        data_tests:
          - not_null
      - name: total_contents
        data_tests:
          - not_null

  - name: mart_job_applications_summary
    columns:
      - name: job_family
        data_tests:
          - not_null
      - name: total_applications
        data_tests:
          - not_null

  - name: mart_contact_account_summary
    columns:
      - name: total_email_addresses
        data_tests:
          - not_null
      - name: total_phone_numbers
        data_tests:
          - not_null
