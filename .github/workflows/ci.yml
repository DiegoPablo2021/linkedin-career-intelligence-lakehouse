name: CI

on:
  push:
    paths-ignore:
      - "README.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "README.md"
      - "docs/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

permissions:
  contents: read

jobs:
  quality-and-build:
    name: Quality And Build
    runs-on: ubuntu-latest
    env:
      LINKEDIN_DUCKDB_PATH: ${{ github.workspace }}/warehouse/linkedin_career_intelligence_validation.duckdb
      LINKEDIN_DB_PATH: ${{ github.workspace }}/warehouse/linkedin_career_intelligence_validation.duckdb
      CI_POWERBI_OUTPUT_DIR: ${{ github.workspace }}/tmp/ci_powerbi_exports

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python tests
        run: python -m pytest -q

      - name: Verify Python packages compile
        run: python -m compileall linkedin_career_intelligence scripts tests

      - name: Lint SQL models
        run: python -m sqlfluff lint

      - name: Run fixture validation pipeline
        run: >
          python scripts/run_pipeline.py
          --mode validation_fixture
          --db-path "${{ env.LINKEDIN_DB_PATH }}"
          --powerbi-output-dir "${{ env.CI_POWERBI_OUTPUT_DIR }}"
          --powerbi-format both
