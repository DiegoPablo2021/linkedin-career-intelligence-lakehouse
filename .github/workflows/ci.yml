name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality:
    runs-on: windows-latest
    env:
      LINKEDIN_DUCKDB_PATH: ${{ github.workspace }}\warehouse\linkedin_career_intelligence.duckdb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ingestion
        run: python scripts/run_ingestion.py

      - name: Run profiling inventory
        run: python scripts/profiling/inventory_linkedin_exports.py

      - name: Run unit tests
        run: python -m pytest -q

      - name: Run dbt build
        working-directory: linkedin_career_intelligence_dbt
        run: dbt build --profiles-dir ..\profiles
