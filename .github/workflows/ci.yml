name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validation:
    runs-on: ubuntu-latest
    env:
      LINKEDIN_DUCKDB_PATH: ${{ github.workspace }}/warehouse/linkedin_career_intelligence_validation.duckdb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full validation suite
        run: python scripts/run_validation.py
