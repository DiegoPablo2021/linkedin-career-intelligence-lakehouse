name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality-and-build:
    name: Quality And Build
    runs-on: ubuntu-latest
    env:
      LINKEDIN_DUCKDB_PATH: ${{ github.workspace }}/warehouse/linkedin_career_intelligence_validation.duckdb
      LINKEDIN_DB_PATH: ${{ github.workspace }}/warehouse/linkedin_career_intelligence_validation.duckdb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python tests
        run: python -m pytest -q

      - name: Verify Python packages compile
        run: python -m compileall linkedin_career_intelligence scripts tests

      - name: Bootstrap validation warehouse
        run: python scripts/ci/bootstrap_validation_warehouse.py

      - name: Lint SQL models
        run: sqlfluff lint

      - name: Build dbt project
        run: >
          dbt build
          --project-dir linkedin_career_intelligence_dbt
          --profiles-dir profiles
