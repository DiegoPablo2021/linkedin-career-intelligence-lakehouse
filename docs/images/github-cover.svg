<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="1" stop-color="#101B2D"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#57E6FF"/>
      <stop offset="1" stop-color="#1FB6FF"/>
    </linearGradient>
    <linearGradient id="pinkGlow" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FF64D6"/>
